{{- $publicCaName := include "5g-control-plane.shared-ca-secret-name" . -}}
{{- $privateCaName := include "5g-control-plane.shared-ca-private-secret-name" . -}}
{{- $managePrivateCaSecret := eq (include "5g-control-plane.manage-shared-ca-private-secret" . | trim) "true" -}}
{{- $sharedCaChecksumAnnotation := include "5g-control-plane.shared-ca-checksum-annotation" . -}}
{{- $leafInputsChecksumAnnotation := include "5g-control-plane.leaf-cert-inputs-checksum-annotation" . -}}
{{- $caCrt := include "5g-control-plane.shared-ca-cert" . -}}
{{- $caKey := include "5g-control-plane.shared-ca-key" . -}}
{{- $caChecksum := include "5g-control-plane.shared-ca-checksum" . | trim -}}
{{- if $managePrivateCaSecret }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ $privateCaName }}
  labels:
{{ tuple "shared-ca-private" . | include "5g-control-plane.metadata_labels" | indent 4 }}
data:
  ca.crt: {{ $caCrt | b64enc }}
  ca.key: {{ $caKey | b64enc }}
---
{{- end }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ $publicCaName }}
  labels:
{{ tuple "shared-ca" . | include "5g-control-plane.metadata_labels" | indent 4 }}
data:
  ca.crt: {{ $caCrt | b64enc }}
{{- if .Values.config.webui.deploy }}
---
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: webui-certs
  labels:
{{ tuple "webui" . | include "5g-control-plane.metadata_labels" | indent 4 }}
  annotations:
    {{ $sharedCaChecksumAnnotation }}: {{ $caChecksum | quote }}
    {{ $leafInputsChecksumAnnotation }}: {{ include "5g-control-plane.leaf-cert-inputs-checksum" (dict "context" . "name" "webui") | quote }}
{{- with .Values.config.webui.serviceAnnotations }}
{{ toYaml . | nindent 4 }}
{{- end }}
data:
{{ ( include "5g-control-plane.gen-certs" (dict "context" . "name" "webui") ) | indent 2 }}
{{- end }}
